<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LOE Builder Pro v19.0 – Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">

  <!--
    v19: Login page now has the FULL sidebar + blue app-header, matching all other pages.
    js/shared.js injects: global-header, toast, app-sidebar (all pages), topBtn, modals
  -->

  <div class="main">
    <header class="app-header">
      <div>🔐 Secure Login — LOE Builder Pro</div>
      <div class="logo-right" id="headerLogoContainer" aria-hidden="true"></div>
    </header>
	  <div class="login-logo-container" align="center">
		  <img src="images/teknicor-logo.svg" alt="Teknicor Logo" style="max-width:180px;display:block;">
  	  </div>
    <BR>
    <div class="login-card-wrapper">
      <div class="login-split-card">

        <div class="login-left">
          <span style="font-size:44px;display:block;margin-bottom:20px;">🔐</span>
          <h2 style="margin-top:0;margin-bottom:10px;">Administrator Authentication</h2>
          <p class="muted" style="margin:0 0 16px 0;line-height:1.6;font-size:13px;">
            Log in to access the <b style="font-size:15px;color:#ef4444;">LOE Builder</b> and <b style="font-size:15px;color:#ef4444;">Settings</b> panels.
		  </p>
          <p class="muted" style="margin:0 0 16px 0;line-height:1.6;font-size:13px;">
		    The <b style="font-size:15px;color:#ef4444;">LOE Generator</b> is available to all users without login.
          </p>

          <div id="serverStatusBadge" class="server-status offline">
            ● Checking server...
          </div>

          <!--<div style="margin-top:16px;font-size:12px;color:var(--muted);">
            <b>Default credentials:</b><br>
            Username: <code>admin</code><br>
            Password: <code>password123</code><br>
            <span style="color:#ef4444;">Change via Settings after first login.</span>
          </div>-->
        </div>

        <div class="login-right">
          <form id="loginForm" onsubmit="handleLogin(event)" style="width:100%;">
            <div class="full-row">
              <label for="username">Username</label>
              <input type="text" id="username" required placeholder="Enter username" autocomplete="username">
            </div>
            <div class="full-row" style="margin-bottom:14px;">
              <label for="password">Password</label>
              <input type="password" id="password" required placeholder="Enter password" autocomplete="current-password">
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:12px;">
              <label style="font-weight:400;display:flex;align-items:center;gap:5px;cursor:pointer;">
                <input type="checkbox" id="rememberMe"> Remember me (8 hours)
              </label>
              <a href="#" onclick="forgotPassword(); return false;" style="color:var(--accent);text-decoration:none;">
                Forgot password?
              </a>
            </div>

            <button type="submit" id="loginBtn" class="btn primary-blue" style="width:100%;height:44px;font-size:15px;">
              Secure Login
            </button>
          </form>
        </div>
      </div>
    </div>
    <div class="login-card-wrapper">
      <div style="width:760px;max-width:100%;">
          <a href="loegenerator.html" class="btn btn-maroon" style="width:97%;text-decoration:none;margin-top:10px;height:38px;">
            &larr; Back to LOE Generator (Public)
          </a>
	  </div>
    </div>
    <footer class="app-footer" id="appFooter"></footer>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
